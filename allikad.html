<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Allikad — SKENE.INFO</title>
<meta name="description" content="Kohad, kust skene.info üritusi ja reliise kokku kogub — korraldajad, klubid, festivalid, plaadifirmad ja poed.">
<style>
:root{
  --paber:#F3F0E7; --tint:#1A1A1A; --hall:#5A564C; --joon:#8F8A7C;
  --telliskivi:#93392C;
  --sans:"Helvetica Neue",Helvetica,Arial,ui-sans-serif,sans-serif;
  --mono:ui-monospace,"SF Mono",Consolas,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paber);color:var(--tint);font-family:var(--sans);font-size:16px;line-height:1.5}
a{color:var(--telliskivi)}
.wrap{max-width:760px;margin:0 auto;padding:26px 24px 60px}
header{border-bottom:3px solid var(--tint);padding-bottom:14px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px}
h1{font-size:clamp(28px,5vw,42px);line-height:.95;letter-spacing:-1px;text-transform:uppercase;font-weight:700}
h1 .info{color:var(--telliskivi)}
.hright{display:flex;align-items:center;gap:14px}
.back{font-family:var(--mono);font-size:12.5px;text-decoration:none}
.langsw{display:flex;border:1.5px solid var(--joon);flex:none}
.langsw button{font-family:var(--mono);font-size:11.5px;background:transparent;color:var(--hall);border:0;padding:3px 9px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.langsw button.on{background:var(--tint);color:var(--paber)}
.intro{margin:0 0 20px;font-size:15px;color:#33302a;max-width:62ch}
.grp{margin-top:26px}
.grp h2{font-family:var(--mono);font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--hall);border-bottom:1px solid var(--joon);padding-bottom:6px;margin-bottom:8px}
.grp ul{list-style:none}
.grp li{padding:6px 0;border-bottom:1px solid #E7E3D8}
.grp li:last-child{border-bottom:0}
.grp a{text-decoration:none;font-size:16px}
.grp a:hover{text-decoration:underline}
.ext{font-family:var(--mono);font-size:11px;color:var(--hall)}
.footer{margin-top:40px;font-family:var(--mono);font-size:12px;color:var(--hall)}
.upd{font-family:var(--mono);font-size:11px;color:var(--hall);margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span data-i18n="h1">Allikad</span><span class="info">.</span></h1>
    <div class="hright">
      <a class="back" href="/" data-i18n="back">← TAGASI SKENE.INFO</a>
      <div class="langsw" role="group" aria-label="Keel / Language">
        <button type="button" data-lang="et" onclick="setLang('et')">EE</button>
        <button type="button" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>
  <p class="intro" data-i18n="intro"></p>
  <div id="groups"></div>
  <p class="footer"><span data-i18n="foot"></span></p>
  <p class="upd" id="upd"></p>
</div>
<script>
var I18N={
 et:{title:"Allikad — SKENE.INFO", h1:"Allikad", back:"← TAGASI SKENE.INFO",
     intro:"Kõik kohad, kust skene.info üritusi ja reliise kokku kogub — korraldajad, klubid, festivalid, plaadifirmad ja poed. Mine jälgi neid otse, siis oled kohe kursis.",
     foot:"Nimekiri täieneb automaatselt, kui sait uue allika üles leiab.", updated:"Uuendatud"},
 en:{title:"Sources — SKENE.INFO", h1:"Sources", back:"← BACK TO SKENE.INFO",
     intro:"Every place skene.info gathers events and releases from — organisers, clubs, festivals, labels and shops. Go follow them directly to stay in the loop.",
     foot:"This list updates automatically as new sources are found.", updated:"Updated"}
};
var GRP_EN={"Korraldajad":"Organisers","Kohad":"Venues","Festivalid":"Festivals","Plaadifirmad ja poed":"Labels & shops","Kogukond":"Community","Instagram":"Instagram","Rahvusvahelised festivalid":"International festivals","Instagram / artistid":"Instagram / artists","Artistid":"Artists","Muud":"Other"};
var LANG=(function(){try{return localStorage.getItem('skene_lang')||'et';}catch(e){return 'et';}})();
var DATA=null;
function t(k){var d=I18N[LANG]||I18N.et;return d[k]!==undefined?d[k]:(I18N.et[k]!==undefined?I18N.et[k]:k);}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function render(){
  var box=document.getElementById('groups');
  if(!DATA){return;}
  box.innerHTML='';
  DATA.groups.forEach(function(g){
    var h=(LANG==='en'&&GRP_EN[g.nimi])?GRP_EN[g.nimi]:g.nimi;
    var html='<div class="grp"><h2>'+esc(h)+'</h2><ul>';
    g.items.forEach(function(it){
      html+='<li><a href="'+esc(it.u)+'" target="_blank" rel="noopener">'+esc(it.n)+' <span class="ext">↗</span></a></li>';
    });
    html+='</ul></div>';
    box.insertAdjacentHTML('beforeend',html);
  });
  var u=document.getElementById('upd');
  u.textContent=DATA.updated?(t('updated')+': '+DATA.updated):'';
}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=t(el.getAttribute('data-i18n'));});
  document.title=t('title');
  document.documentElement.setAttribute('lang',LANG);
  document.querySelectorAll('.langsw button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-lang')===LANG);});
  render();
}
function setLang(l){LANG=l;try{localStorage.setItem('skene_lang',l);}catch(e){}applyI18n();}
fetch('data/allikad.json').then(function(r){return r.json();}).then(function(j){DATA=j;applyI18n();}).catch(function(){document.getElementById('groups').innerHTML='<p class="intro">—</p>';});
applyI18n();
</script>
</body>
</html>
